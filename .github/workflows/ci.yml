name: DevOps Lumera CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run application test
      run: |
        python -c "import app"

    - name: Build Docker image
      run: |
        docker build -t devops-lumera .

    - name: Tag staging image
      run: docker tag devops-lumera devops-lumera:staging

- name: Deploy staging container
      run: |
        docker stop staging-container || true
        docker rm staging-container || true
        docker run -d -p 5001:5000 --name staging-container devops-lumera
